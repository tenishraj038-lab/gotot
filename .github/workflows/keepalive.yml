name: Keep Render Alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code} - %{time_total}s\n" "${{ secrets.BACKEND_URL }}/health"
          echo "Ping complete"
