x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
      - static_volume:/static
    depends_on:
      - frontend
      - backend
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/static
      - downloads_volume:/tmp/downloads
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_worker:
    image: gotot-backend:latest
    command: celery -A celery worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4} --max-tasks-per-child=100
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - downloads_volume:/tmp/downloads
    logging: *default-logging
    restart: unless-stopped

  celery_beat:
    image: gotot-backend:latest
    command: celery -A celery beat --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - celery_worker
      - redis
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gotot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gotot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gotot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gotot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru ${REDIS_REQUIREPASS:+--requirepass ${REDIS_REQUIREPASS}}
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    logging: *default-logging
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gotot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gotot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gotot}
      PGHOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 */6 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f
    logging: *default-logging
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  downloads_volume:
  prometheus_data:
  nginx_ssl:
