<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoTot Downloader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #c026d3);
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 18px; color: white;
    }
    .title { font-size: 18px; font-weight: 700; }
    .title span { background: linear-gradient(135deg, #3b82f6, #c026d3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid #1e293b; background: #1e293b; color: #f1f5f9;
      font-size: 13px; outline: none; margin-bottom: 12px;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #3b82f6, #c026d3);
      color: white; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .info { margin-top: 12px; padding: 10px; border-radius: 10px; background: #1e293b; display: none; }
    .info.show { display: block; }
    .info h3 { font-size: 13px; margin-bottom: 6px; }
    .info p { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .format-list { margin-top: 8px; }
    .format-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 8px; background: #0f172a; margin-bottom: 4px;
    }
    .format-item button {
      width: auto; padding: 4px 10px; font-size: 11px;
    }
    .error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
    .error.show { display: block; }
    .footer { margin-top: 16px; text-align: center; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">G</div>
    <div class="title"><span>GoTot</span> Downloader</div>
  </div>
  <input type="url" id="urlInput" placeholder="Paste video URL...">
  <button id="analyzeBtn">Analyze & Download</button>
  <div class="info" id="infoPanel">
    <h3 id="videoTitle">Title</h3>
    <p id="videoMeta">Platform • Duration</p>
    <div class="format-list" id="formatList"></div>
  </div>
  <div class="error" id="errorMsg"></div>
  <div class="footer">GoTot v1.0 &bull; <a href="https://gotot.app" style="color:#3b82f6;text-decoration:none;">Open Full Site</a></div>
  <script src="popup.js"></script>
</body>
</html>
