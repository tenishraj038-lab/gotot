global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_WEBHOOK_URL:-}
  email:
    to: ${ALERT_EMAIL:-admin@gotot.app}
    from: alertmanager@gotot.app
    smarthost: ${SMTP_HOST:-localhost}:${SMTP_PORT:-587}
    auth_username: ${SMTP_USER:-}
    auth_password: ${SMTP_PASSWORD:-}

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: warning
      repeat_interval: 2h

receivers:
  - name: default
    slack_configs:
      - channel: '#gotot-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true
    email_configs:
      - to: ${ALERT_EMAIL:-admin@gotot.app}
        send_resolved: true

  - name: critical
    slack_configs:
      - channel: '#gotot-critical'
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true
    email_configs:
      - to: ${ALERT_EMAIL:-admin@gotot.app}
        send_resolved: true
        headers:
          subject: '[CRITICAL] GoTot Alert - {{ .GroupLabels.alertname }}'

  - name: warning
    slack_configs:
      - channel: '#gotot-alerts'
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true
